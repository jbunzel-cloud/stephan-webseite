name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - claude/setup-astro-cloudflare-Q7yWs
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: e69db7f45ad7a2375a38a35446cffbc9
          command: pages deploy dist --project-name=stephan-webseite --commit-dirty=true
